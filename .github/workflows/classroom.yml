name: GitHub Classroom Workflow
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build
        id: build-project
        uses: education/autograding-command-grader@v1
        with:
          test-name: Build
          setup-command: pio --version
          command: pio run
          timeout: 10
          max-score: 50

      - name: MotorFormula
        id: smart-drive-check
        uses: education/autograding-command-grader@v1
        with:
          test-name: MotorFormula
          command: grep -E "MOTOR_START_OFFSET.*\+.*speed.*255.*MOTOR_START_OFFSET.*/.*255" src/main.cpp
          timeout: 1
          max-score: 20

      - name: GammaLogic
        id: gamma-check
        uses: education/autograding-command-grader@v1
        with:
          test-name: GammaLogic
          command: grep -E "i.*i.*/.*255" src/main.cpp
          timeout: 1
          max-score: 20

      - name: ReportFile
        id: report-check
        uses: education/autograding-command-grader@v1
        with:
          test-name: ReportFile
          command: test -f docs/Report.md
          timeout: 1
          max-score: 10

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          BUILD_RESULTS: "${{steps.build-project.outputs.result}}"
          MOTORFORMULA_RESULTS: "${{steps.smart-drive-check.outputs.result}}"
          GAMMALOGIC_RESULTS: "${{steps.gamma-check.outputs.result}}"
          REPORTFILE_RESULTS: "${{steps.report-check.outputs.result}}"
        with:
          runners: build-project,smart-drive-check,gamma-check,report-check
